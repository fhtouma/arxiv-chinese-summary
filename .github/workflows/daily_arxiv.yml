name: Daily arXiv Astro-ph Summary

# 触发条件
# 触发条件
on:
  schedule:
    # 每天 UTC 时间 02:45 执行（北京时间上午 10:45）
    # 星期字段设为 1-5，表示仅在周一到周五运行，完美避开 arXiv 的周末停更期
    - cron: '45 2 * * 1-5'
  workflow_dispatch: # 保留这个，方便你随时手动点击运行测试

jobs:
  run-bot:
    runs-on: ubuntu-latest # 使用 GitHub 的免费 Linux 服务器
    steps:
      - name: 获取代码仓库
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # 升级到受支持的 Python 版本

      - name: 安装 Python 依赖包
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 markdown google-genai # 使用最新的 google-genai 库

      - name: 运行主程序
        env:
          # 将 GitHub Secrets 注入为环境变量
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        run: python -u main.py
